<!DOCTYPE html>
<html>
<body>

<h1>Files</h1>
<ul>
  {% assign files = site.static_files | sort: "path" %}

  {% for file in files %}
    {% if file.extname == ".html" and file.name != "index.html" %}
      <li>
<a href="{{ site.baseurl }}{{ file.path }}">
  {{ file.name }}
</a><br>      </li>
    {% endif %}
  {% endfor %}
</ul>

</body>
</html>
