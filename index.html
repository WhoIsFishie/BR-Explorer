<!DOCTYPE html>
<html>
<head>
  <title>Index</title>
</head>
<body>

<h1>Files</h1>
<ul>
  {% assign pages = site.pages | sort: "path" %}
  
  {% for page in pages %}
    {% if page.path contains ".html" and page.name != "index.html" %}
      <li>
        <a href="{{ page.url }}">{{ page.path }}</a>
      </li>
    {% endif %}
  {% endfor %}
</ul>

</body>
</html>
